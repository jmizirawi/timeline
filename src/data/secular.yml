  - id: athenagoras-of-athens
    name: Athenagoras of Athens
    born: 133
    description: Christian philosopher of Athens who wrote "A Plea for the Christians" (c. 177 CE) defending Christianity against charges of atheism, cannibalism, and incest before Emperor Marcus Aurelius. He was among the earliest thinkers to articulate a philosophical defense of the Trinity, blending Platonic philosophy with Christian theology.
    lifeEvents:
      - startDate: 133
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/athenagoras-of-athens/
