    born: -133
    bornCertainty: guess
    description: Idumean politician and father of Herod the Great who founded the Herodian dynasty through political alliance with Rome. He was appointed the first Roman procurator of Judea by Julius Caesar in 47 BCE, laying the political groundwork that enabled his son Herod to rule as king during the time of Jesus' birth.
