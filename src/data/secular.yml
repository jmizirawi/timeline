        title: Ignatius bishop of Antioch adovacates distiction of bishop (overseers) and presbyters (older men) in the congregations
    died: 150
    diedCertainty: guess
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/ignatius-of-antioch/
  - id: polycarp-of-smyrna
    name: Polycarp of Smyrna
    born: 69
    description: Bishop of Smyrna and disciple of the Apostle John who was martyred at approximately age 86 for refusing to renounce Christ. His letter to the Philippians and the "Martyrdom of Polycarp" are important documents of early post-apostolic Christianity, and his long life bridged the apostolic and post-apostolic eras.
    lifeEvents:
