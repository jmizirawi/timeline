    born: -190
    description: Jewish military leader who led the Maccabean revolt against the Seleucid king Antiochus IV Epiphanes, who had desecrated the Jerusalem temple with pagan offerings. His victory in 164 BCE and the rededication of the cleansed temple gave rise to the festival of Hanukkah and temporarily restored Jewish self-rule in Judea.
