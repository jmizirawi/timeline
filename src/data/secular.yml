    died: 14
    url: https://en.wikipedia.org/wiki/Augustus
    description: First Roman Emperor who established the Principate and ushered in the Pax Romana, a period of relative peace and stability across the empire. He ruled during the birth of Jesus Christ—Luke 2:1 records that Caesar Augustus issued a decree for a census of the entire inhabited earth—and oversaw Rome at the height of its power.
