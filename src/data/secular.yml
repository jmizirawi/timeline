    name: Philip the Tetrarch
    born: -20
    bornCertainty: guess
    description: Son of Herod the Great who governed Iturea, Trachonitis, and surrounding territories northeast of the Sea of Galilee as a tetrarch from 4 BCE. He rebuilt and renamed the city of Caesarea Philippi, the very location where Jesus asked his disciples "Who do you say I am?" (Matt. 16:13), and was considered the most just of Herod's sons.
