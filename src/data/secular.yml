  - id: cyprian-of-carthage
    name: Cyprian of Carthage
    born: 210
    description: Bishop of Carthage and influential church father who became a major advocate for the supreme authority of bishops over presbyters, deacons, and laity. His writings on ecclesiastical unity and episcopal hierarchy significantly shaped the structure of the Roman Catholic Church and the concept of apostolic succession.
    lifeEvents:
      - startDate: 210
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/cyprian-of-carthage/
        title: Cyprian born
      - startDate: 250
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/cyprian-of-carthage/
        title: Cyrian bishop of Carthage strong advocate for authority of Bishops as separate from priests, decons, and laity
    died: 310
    diedCertainty: guess
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/cyprian-of-carthage/
  - id: arius
    name: Arius
    born: 256
    bornCertainty: circa
    died: 336
    url: https://www.jw.org/en/library/books/Mankinds-Search-for-God/Apostasy-The-Way-to-God-Blocked/
    description: Alexandrian priest whose teaching that the Son of God was a created being subordinate to the Father—"there was a time when he was not"—triggered the defining theological crisis of early Christianity. His position aligned with the earlier consensus of pre-Nicene writers and provoked Emperor Constantine to convene the Council of Nicaea (325 CE), where Arius was condemned and exiled, though his views continued to spread widely for decades afterward.
    lifeEvents:
      - startDate: 256
        startDateCertainty: circa
        title: Born in Libya (Cyrenaica)
      - startDate: 311
        startDateCertainty: circa
        title: Ordained as presbyter in Alexandria under Bishop Peter
      - startDate: 318
        startDateCertainty: circa
        title: Begins teaching that the Son was created by the Father and therefore not co-eternal — "there was a time when he was not"
      - startDate: 320
        startDateCertainty: circa
        title: Condemned and excommunicated by a local synod in Alexandria under Bishop Alexander
      - startDate: 325
        title: Council of Nicaea convened; Arius's views condemned, Nicene Creed adopted, Arius exiled
      - startDate: 327
        title: Constantine recalls Arius from exile after receiving his written statement of faith
      - startDate: 336
        title: Dies suddenly in Constantinople on the eve of his planned reinstatement to the Alexandrian church
  - id: constantine
    name: Constantine
    born: 272
    description: First Roman Emperor to convert to Christianity, whose Edict of Milan (313 CE) granted religious tolerance throughout the empire and effectively ended the persecution of Christians. He convened the First Council of Nicaea (325 CE) to settle disputes about Christ's nature and moved the imperial capital east to Constantinople, transforming Christianity from a persecuted sect into the dominant religion of the Roman world.
    lifeEvents:
      - startDate: 272
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/emperor-constantine/
        title: Constantine born
      - startDate: 306
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/emperor-constantine/
        title: Reign as Roman Emperor
      - startDate: 313
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/emperor-constantine/
        title: Constantine conversion to christianity
      - startDate: 337
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/emperor-constantine/
        title: Constantine dies (65 years)
    died: 337
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/emperor-constantine/
  - id: augustine-of-hippo
    name: Augustine of Hippo
    born: 354
    description: North African bishop and theologian whose prolific writings shaped Western Christianity more than any other thinker after Paul. His doctrines of original sin, predestination, divine grace, and the nature of the Church—found in "Confessions" and "City of God"—became foundational for both Roman Catholic and Protestant theology and remain deeply influential to this day.
    lifeEvents:
      - startDate: 354
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/augustine-of-hippo/
        title: Augustine born
      - startDate: 400
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/augustine-of-hippo/
        title: 'Augustine of Hippo states in City of God: “The Church even now is the kingdom of Christ, and the kingdom of heaven.”'
      - startDate: 430
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/augustine-of-hippo/
        title: Augustine dies
    died: 430
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/augustine-of-hippo/
  - id: muhammad
    name: Muhammad
    born: 570
    description: Founder of Islam who claimed to receive divine revelations from the angel Gabriel, later recorded in the Quran. He united the fractious Arab tribes under a new monotheistic religion and established both a religious community (ummah) and a political state, whose rapid expansion after his death created one of history's largest empires.
    lifeEvents:
      - startDate: 570
        title: Born in Mecca into the Quraysh tribe
      - startDate: 576
        startDateCertainty: circa
        title: Mother Aminah dies; raised by grandfather then uncle Abu Talib
      - startDate: 595
        title: Marries Khadijah, a wealthy merchant widow who becomes his first wife and supporter
      - startDate: 610
        title: Claims first revelation in the Cave of Hira on Mount Jabal al-Nour; begins preaching monotheism in Mecca
      - startDate: 613
        title: Begins public preaching; faces growing opposition from Meccan polytheists
      - startDate: 619
        title: Year of Sorrow — Khadijah and uncle Abu Talib both die, removing his two key protectors
      - startDate: 622
        title: Hijra — flees Mecca to Medina with followers; year marks the start of the Islamic calendar
      - startDate: 624
        title: Battle of Badr — first major military victory against Meccan forces
      - startDate: 625
        title: Battle of Uhud — Muslim forces suffer setback against Meccan army
      - startDate: 627
        title: Battle of the Trench — Medina successfully defended against Meccan coalition
      - startDate: 628
        title: Treaty of Hudaybiyyah — 10-year truce with Mecca; pilgrimage rights negotiated
      - startDate: 630
        title: Conquest of Mecca — enters largely unopposed; destroys idols in the Kaaba
      - startDate: 632
        title: Farewell Pilgrimage to Mecca; delivers final sermon at Mount Arafat
      - startDate: 632
        title: Died in Medina; Abu Bakr becomes first caliph
    died: 632
    url: https://en.wikipedia.org/wiki/Muhammad
  - id: abu-bakr
    name: Abu Bakr
    born: 573
    description: Muhammad's closest companion and father-in-law, who became the first caliph of Islam upon the prophet's death in 632 CE. During his brief two-year caliphate he suppressed the apostasy wars (Ridda wars) that threatened to fracture the early Muslim community, and oversaw the first compilation of the Quran into a single written volume.
    lifeEvents:
      - startDate: 573
        title: Born
      - startDate: 632
        title: Becomes first Caliph upon Muhammad's death
      - startDate: 632
        title: Suppresses Ridda (apostasy) wars, preserving Muslim unity
      - startDate: 633
        title: Orders first compilation of the Quran into a single manuscript
      - startDate: 634
