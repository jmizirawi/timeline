  - id: irenaeus
    name: Irenaeus
    born: 130
    description: Bishop of Lyon and one of the earliest systematic Christian theologians whose work "Against Heresies" documented and refuted Gnosticism. He championed the authority of the four canonical Gospels and apostolic succession, shaping what would become orthodox Christianity's response to diverse early Christian movements.
    lifeEvents:
      - startDate: 130
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/irenaeus/
