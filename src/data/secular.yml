  - id: josephus
    name: Josephus
    born: 37
    description: First-century Jewish historian, priest, and Roman citizen whose writings are among the most important non-biblical sources for Second Temple Judaism. His works "Jewish Antiquities" and "The Jewish War" contain notable references to John the Baptist, James the brother of Jesus, and Jesus himself, as well as detailed accounts of the destruction of Jerusalem in 70 CE.
