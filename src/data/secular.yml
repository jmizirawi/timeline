      - startDate: 250
        startDateCertainty: circa
        title: Died
  - id: tertullian
    name: Tertullian
    born: 155
    description: 'Prolific early Christian writer from Carthage and the first major theologian to write in Latin, who coined the theological term "Trinity" (Latin: trinitas). His legal training gave his writings a sharp argumentative edge that shaped foundational Western Christian vocabulary and theology, though he later joined the Montanist movement.'
    lifeEvents:
      - startDate: 155
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/tertullian/
