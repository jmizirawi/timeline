  - id: nagarjuna
    name: Nagarjuna
    born: 150
    bornCertainty: circa
    died: 250
    diedCertainty: circa
    url: https://en.wikipedia.org/wiki/Nagarjuna
    description: Indian Buddhist monk and philosopher who founded the Madhyamaka (Middle Way) school of Mahayana Buddhism. His doctrine of sunyata (emptiness) became central to Mahayana philosophy and profoundly shaped later Buddhist thought across East Asia and Tibet.
    lifeEvents:
      - startDate: 150
        startDateCertainty: circa
        title: Born in southern India
      - startDate: 200
