    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/john-hyrcanus/
    born: -164
    description: Hasmonean high priest and ruler of Judea who greatly expanded the Jewish state following the Maccabean revolt. He is notable for forcibly converting the Idumeans (Edomites) to Judaism—an act with lasting consequences, as their descendant Herod the Great would later become king of Judea and rule during the birth of Jesus Christ.
