  - id: justin-martyr
    name: Justin Martyr
    born: 100
    description: Second-century Christian philosopher and apologist who wrote two "Apologies" defending Christianity to Roman emperors and a "Dialogue with Trypho" engaging Jewish objections. He was one of the first to use Greek philosophy to explain Christian doctrines, and was beheaded in Rome for refusing to sacrifice to pagan gods.
    lifeEvents:
      - startDate: 100
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/justin-martyr/
