  - id: ignatius-of-antioch
    name: Ignatius of Antioch
    born: 50
    description: Early bishop of Antioch who wrote seven influential letters on his journey to martyrdom in Rome. He was a key promoter of a three-tier church hierarchy of bishops, presbyters, and deacons, departing from the simpler congregational structure of the apostolic era and accelerating the post-apostolic drift toward hierarchical church governance.
    lifeEvents:
      - startDate: 50
        url: https://www.jw.org/en/library/books/insight-on-the-scriptures/ignatius-of-antioch/
