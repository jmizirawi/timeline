    born: -356
    died: -323
    url: https://en.wikipedia.org/wiki/Alexander_the_Great
    description: King of Macedon who created one of the ancient world's largest empires, stretching from Greece to northwestern India in just 13 years. His swift campaigns fulfilled the Bible's prophetic description of the conspicuous male goat (Dan. 8:5), and his spread of Greek language and culture across the Near East prepared the way for the New Testament writings.
