  - id: 400-years-of-persecution
    title: 400 Years of Affliction Upon Abraham's Offspring
    startDate: -1919
    description: (Ge 21:8-21; 15:13; Ga 4:29) The 400-year period of affliction begins with Ishmael persecuting Isaac (Ge 21:8-21). It ends with the Exodus (Ex 12:40-41).
