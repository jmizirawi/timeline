  - id: john-baptist
    name: John (Baptist)
    description: >-
      The miraculous son of Zechariah and Elizabeth, John served as the divinely appointed forerunner of Jesus Christ. He was a courageous prophet who preached repentance in the wilderness and prepared the way for the Messiah, eventually introducing Jesus as the "Lamb of God." His faithful ministry ended in martyrdom under Herod Antipas.
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/john/
    born: -2
    bornCertainty: guess
    lifeEvents:
      - startDate: -2
        startDateCertainty: guess
        title: John born (Luke 1:57)
        location: Hill country of Judea
        description: "John is born to the elderly Zechariah and Elizabeth as a miracle of God. Date Reasoning: Born six months before Jesus. Since Jesus was born in the autumn of 2 B.C.E., John's birth is placed in the spring of 2 B.C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=Birth%20by%20a%20miracle%20of%20God"
      - startDate: 29
        title: Begins Ministry (Luke 3:1-3)
        location: Wilderness of Judea
        description: "John begins his ministry as a forerunner, preaching baptism for forgiveness of sins. Date Reasoning: Commenced in the 15th year of Tiberius Caesar. Since he was six months older than Jesus and began at age 30, his ministry started in the spring of 29 C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=begun%20his%20ministry%20in%20the%20spring%20of%2029%C2%A0C.E."
      - startDate: 29
        title: Baptizes Jesus (Matt 3:13-17)
        location: Jordan River
        description: "John baptizes Jesus and identifies him as the Son of God through a divine sign. Date Reasoning: Occurred in the autumn of 29 C.E. when Jesus was about 30 years targets."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=autumn%20of%2029%C2%A0C.E.%2C%20Jesus%20came%20to%20John%20to%20be%20baptized"
      - startDate: 30
        title: Identification of the Messiah (John 1:29)
        location: Bethany (across the Jordan)
        description: "Following Jesus' return from the wilderness, John introduces him to his disciples as 'the Lamb of God.' Date Reasoning: Occurred roughly 40 days after Jesus' baptism, likely in late 29 or early 30 C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=pointed%20Jesus%20out%20to%20his%20disciples%20as%20%E2%80%9Cthe%20Lamb%20of%20God"
      - startDate: 30
        title: Imprisoned (Matt 14:3)
        location: Tiberias (likely)
        description: "Herod Antipas imprisons John for reproving his illegitimate marriage to Herodias. Date Reasoning: After a year or more of active ministry, John was taken out of the field, likely in 30 or 31 C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=year%20or%20more%20of%20active%20ministry%2C%20John%20was%20forcibly%20taken"
      - startDate: 31
        title: Questioning from Prison (Matt 11:2-6)
        location: Tiberias
        description: "From prison, John sends disciples to Jesus for confirmation of his messiahship after hearing of his works. Date Reasoning: Occurred while John was imprisoned, following Jesus' miracle at Nain in 31 C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=resurrecting%20a%20widow%E2%80%99s%20son%20at%20Nain"
      - startDate: 32
        title: Martyrdom (Matt 14:6-12)
        location: Tiberias
        description: "John is beheaded at the request of Herodias' daughter during Herod's birthday celebration. Date Reasoning: Occurred shortly before the Passover of 32 C.E."
        url: "https://www.jw.org/en/library/books/Insight-on-the-Scriptures/John/#:~:text=beheaded%20in%20prison%20and%20his%20head%20was%20delivered%20on%20a%20platter"
    died: 32
    diedCertainty: guess

  - id: jesus
    name: Jesus
    description: >-
      Jesus Christ is the only-begotten Son of Jehovah and the firstborn of all creation, serving as the central figure in the outworking of God's universal purpose. As the Word and Spokesman for his Father, he came to earth to bear witness to the truth and to provide his life as a ransom for many. His faithful death on Nisan 14, 33 C.E., and subsequent resurrection provide the basis for the vindication of Jehovah's sovereignty and the salvation of mankind.
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/jesus-christ/
    born: -2
    lifeEvents:
