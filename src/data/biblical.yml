      - startDate: 29
        title: Tempted by the Devil (Matt 4:1-11)
        location: Judean Wilderness
        description: "Immediately after his baptism, Jesus is led into the wilderness where he resists three direct temptations from Satan. Date Reasoning: Occurred 40 days after his baptism in late 29 C.E."
