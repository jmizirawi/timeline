        description: "Jesus is born in fulfillment of prophecy to Mary in Bethlehem of Judea. Date Reasoning: Born six months after John the Baptist (who began ministry in the spring of 29 C.E. at age 30, placing his birth in spring 2 B.C.E.). Thus, Jesus was born in the autumn of 2 B.C.E."
        url: "https://www.jw.org/en/library/bible/nwt/appendix-a/events-in-jesus-life-on-earth/#:~:text=Jesus%20born%3B%20%E2%80%9Cthe%20Word%20became%20flesh%E2%80%9D"
      - startDate: -2
        title: Jesus Circumcised and Presented in the Temple (Luke 2:21-38)
        location: Bethlehem; Jerusalem
        description: "Jesus is circumcised on the eighth day and later presented at the temple in Jerusalem by his parents, as required by the Mosaic Law. Date Reasoning: Occurred in late 2 B.C.E., following his birth in October."
        url: "https://www.jw.org/en/library/bible/nwt/appendix-a/events-in-jesus-life-on-earth/#:~:text=Jesus%20circumcised%20(8th%20day)%3B%20presented%20in%20temple"
      - startDate: -1
        title: Astrologers Visit; Family Flees to Egypt (Matt 2:1-23)
        location: Bethlehem; Egypt; Nazareth
        description: "Astrologers from the East visit Jesus in Bethlehem. Warned by God, the family flees to Egypt to escape Herod’s decree before later settling in Nazareth. Date Reasoning: Occurred roughly a year or two after Jesus' birth (c. 1 B.C.E.)."
        url: "https://www.jw.org/en/library/bible/nwt/appendix-a/events-in-jesus-life-on-earth/#:~:text=Astrologers%20visit%3B%20family%20flees%20to%20Egypt"
      - startDate: 12
        title: Twelve-Year-Old Jesus at the Temple (Luke 2:41-50)
        location: Jerusalem
        description: "As a 12-year-old, Jesus amazes teachers at the temple with his understanding and answers during the Passover. Date Reasoning: Occurred when Jesus was 12 years old (c. 12 C.E.)."
        url: "https://www.jw.org/en/library/bible/nwt/appendix-a/events-in-jesus-life-on-earth/#:~:text=Twelve%2Dyear%2Dold%20Jesus%20at%20the%20temple%20questions%20teachers"
      - startDate: 29
        title: Jesus Baptized and Anointed (Matt 3:13-17)
        location: Jordan River
        description: "Jesus is baptized by John and anointed with holy spirit, marked by Jehovah's approval as his Son. Date Reasoning: Occurred in the fall of 29 C.E. when Jesus was 'about 30 years old.'"
