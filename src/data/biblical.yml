      - startDate: 29
        title: First Disciples Join Jesus (John 1:19-51)
        location: Bethany across Jordan
        description: "John the Baptist identifies Jesus as the 'Lamb of God,' leading Andrew, Peter, Philip, Nathanael, and others to follow him. Date Reasoning: Late 29 C.E., shortly after his return from the wilderness."
