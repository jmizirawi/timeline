  - id: paul
    name: Paul
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/
    description: "An Israelite of Benjamin, a Roman citizen from birth, and a former Pharisee trained by Gamaliel who became the apostle to the nations. Transitioning from a fierce persecutor of Christians to a prolific missionary and author, he wrote 14 letters of the Christian Greek Scriptures and exerted himself tirelessly in establishing congregations across Asia Minor and Europe. His Roman name Paul and Hebrew name Saul reflect his background and commission to non-Jews."
    born: 3
    bornCertainty: guess
    lifeEvents:
      - startDate: 34
        title: Conversion on the Way to Damascus (Acts 9:3-9)
        location: Near Damascus
        description: "Christ Jesus reveals himself to Saul in a flashing light and commissions him to be a witness, resulting in Saul’s temporary blindness and subsequent baptism. Date Reasoning: Commonly placed c. 34 C.E., shortly after Stephen's stoning."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=Christ%20Jesus%20revealed%20himself%20to%20Paul"
      - startDate: 36
        title: Arrival in Jerusalem and Meeting with Peter (Gal 1:18, 19)
        location: Jerusalem
        description: "Paul spends 15 days with Cephas (Peter) and meets James the brother of the Lord, after being brought to the apostles by Barnabas. Date Reasoning: Occurred 'three years' (parts of three years) after his conversion, c. 36 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=Arriving%20at%20Jerusalem%20(perhaps%20in%2036%C2%A0C.E.)"
      - startDate: 46
        title: Relief Ministration to Jerusalem (Acts 11:29, 30)
        location: Antioch; Jerusalem
        description: "Paul and Barnabas are sent by the Antioch congregation with a relief ministration to the brothers in Jerusalem during a great famine. Date Reasoning: Occurred c. 46 C.E., about a year after their labor in Antioch."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=About%2046%C2%A0C.E.%2C%20after%20a%20year%E2%80%99s%20labor"
      - startDate: 47
        title: First Missionary Journey (Acts 13:4–14:28)
        location: Cyprus; Asia Minor
        description: "Guided by holy spirit, Paul, Barnabas, and John Mark travel to Cyprus and Asia Minor, establishing many congregations. Date Reasoning: Spanned c. 47-48 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=began%20his%20first%20missionary%20journey%20(c.%C2%A047%2D48%C2%A0C.E.)"
      - startDate: 49
        title: Meeting of the Apostles Regarding Circumcision (Acts 15:1-29)
        location: Jerusalem
        description: "Paul and Barnabas go to Jerusalem to settle the issue of circumcision for Gentile believers before the apostles and older men. Date Reasoning: Occurred in about 49 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=came%20to%20Antioch%20(in%20about%2049%C2%A0C.E.)"
      - startDate: 49
        title: Censuring Peter in Antioch (Gal 2:11-14)
        location: Antioch
        description: "Paul courageously censures Peter (Cephas) publicly for withdrawing from Gentile Christians due to pressure from Jewish traditionalists. Date Reasoning: Sometime after the Jerusalem council in 49 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=Paul%20courageously%20censured%20Peter%20publicly"
      - startDate: 49
        title: Second Missionary Journey and Macedonian Vision (Acts 15:36–18:22)
        location: Macedonia; Greece; Asia Minor
        description: "Paul travels with Silas through Asia Minor and Europe after receiving a vision of a Macedonian man entreating help. Date Reasoning: Spanned c. 49-52 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=traveled%20through%20Syria%20and%20into%20Asia%20Minor%20(c.%C2%A049%2D52%C2%A0C.E.)"
      - startDate: 50
        title: Writing First and Second Thessalonians (1 Thess 1:1; 2 Thess 1:1)
        location: Corinth
        description: "During his 18-month stay in Corinth, Paul writes his two letters to the congregation in Thessalonica. Date Reasoning: Written c. 50-51 C.E., while Silas and Timothy were with him."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=apparently%20wrote%20his%20two%20letters%20to%20the%20Thessalonians"
      - startDate: 52
        title: Third Missionary Journey and Labor in Ephesus (Acts 18:23–21:17)
        location: Ephesus; Macedonia; Greece
        description: "Paul revisits Ephesus, laboring there for three years, and strengthens congregations throughout Macedonia and Greece. Date Reasoning: Spanned c. 52-56 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=On%20his%20third%20missionary%20journey%20(c.%C2%A052%2D56%C2%A0C.E.)"
      - startDate: 56
        title: Resurrection of Eutychus (Acts 20:9-12)
        location: Troas
        description: "Paul restores the young man Eutychus to life after he fell to his death from a third-story window during a late-night discourse in Troas. Date Reasoning: Occurred at the end of Paul's third missionary journey in 56 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=On%20his%20way%20to%20Jerusalem%2C%20Paul%20discoursed%20at%20Troas%20and%20raised%20the%20accidentally%20killed%20Eutychus%20to%20life"
      - startDate: 56
        title: Arrested in the Temple (Acts 21:26-33)
        location: Jerusalem
        description: "While ceremonially cleansing himself, Paul is attacked by a mob of Asian Jews and rescued/arrested by Roman soldiers. Date Reasoning: Occurred c. 56 C.E., following his return from the third journey."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=While%20Paul%20was%20at%20the%20temple"
      - startDate: 56
        title: Defense Before Felix and Festus (Acts 24:1–26:32)
        location: Caesarea
        description: "Paul is held in custody in Caesarea for two years, where he defends his faith before Governors Felix and Festus, and King Agrippa II. Date Reasoning: Spanned c. 56-58 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=kept%20Paul%20in%20custody%20for%20two%20years"
      - startDate: 58
        title: Shipwrecked on Malta (Acts 27:1–28:1)
        location: Malta
        description: "On his journey to Rome after appealing to Caesar, Paul's ship is wrecked on the island of Malta during a violent storm. Date Reasoning: Occurred in late 58 C.E., before the arrive in Rome in 59 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=experienced%20shipwreck%20on%20the%20island%20of%20Malta"
      - startDate: 59
        title: First Imprisonment at Rome (Acts 28:16-31)
        location: Rome
        description: "Paul is kept under house arrest for two years, during which he preaches freely to visitors and writes letters to the Ephesians, Philippians, Colossians, and Philemon. Date Reasoning: Spanned about 59-61 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=from%20about%2059%20to%2061%C2%A0C.E"
      - startDate: 65
        title: Second Imprisonment and Martyrdom (2 Tim 4:6-8)
        location: Rome
        description: "After a period of release and renewed activity, Paul is imprisoned again in Rome and writes his final letter (2 Timothy) before being martyred. Date Reasoning: Imprisonment c. 65 C.E., with martyrdom likely following shortly under Nero."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/paul/#:~:text=During%20that%20imprisonment%20(c.%C2%A065%C2%A0C.E.)"
    died: 65
    diedCertainty: guess
    
  - id: stephen
    name: Stephen
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/stephen/
    description: "The first Christian martyr and one of the seven 'certified men' appointed in Jerusalem to oversee the distribution of food. Full of spirit and wisdom, he was a powerful preacher whose bold defense before the Sanhedrin remains a cornerstone of early Christian history. His name, of Greek origin, signifies a 'crown' or 'wreath,' reflecting his faithful course unto death."
    born: 5
    bornCertainty: guess

    lifeEvents:
      - startDate: 33
        title: Appointment to the Ministry of Distribution (Acts 6:1-6)
        location: Jerusalem
        description: "Stephen is selected as one of seven qualified men to manage the daily distribution of food to widows, ensuring fair treatment for both Greek-speaking and Hebrew-speaking Jews. Date Reasoning: Shortly after Pentecost 33 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/stephen/#:~:text=Stephen%E2%80%99s%20name%20first%20appears%20in%20the%20Bible%20record%20in%20connection%20with%20the%20appointment"
      - startDate: 34
        title: Preaching and Opposition (Acts 6:8-10)
        location: Jerusalem
        description: "While fulfilling his ministerial duties, Stephen performs great portents and signs, leading to fierce opposition from the Synagogue of the Freedmen. Date Reasoning: Occurred in the general period following his appointment (c. 34 C.E.)."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/stephen/#:~:text=Wait%20while%20taking%20care%20of%20these%20appointed%20ministerial%20duties%2C%20Stephen%20vigorously%20continued%20his%20Christian%20preaching"
      - startDate: 34
        title: Defense Before the Sanhedrin (Acts 7:2-53)
        location: Jerusalem
        description: "Brought before the high council on false charges of blasphemy, Stephen delivers a powerful historical defense of God's dealings with Israel, concluding with a stinging rebuke of the religious leaders. Date Reasoning: c. 34 C.E., immediately preceding his martyrdom."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/stephen/#:~:text=Stephen%20boldly%20recounted%20God%E2%80%99s%20dealings%20with%20the%20Hebrews"
      - startDate: 34
        title: Martyred by Stoning (Acts 7:58–8:2)
        location: Outside Jerusalem
        description: "After witnessing a vision of Jesus at God's right hand, Stephen is cast out of the city and stoned to death while praying for his executioners. Date Reasoning: c. 34 C.E., marking the beginning of great persecution against the Jerusalem congregation."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/stephen/#:~:text=they%20stoned%20Stephen%20to%20death"
    died: 34
    diedCertainty: guess
    
  - id: luke
    name: Luke
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/
    description: "A beloved physician and faithful companion of the apostle Paul, Luke authored both the Gospel that bears his name and the book of Acts. His well-educated background and medical training are evident in his precise writing and use of medical terminology. Luke stuck close to Paul and was with him shortly before the apostle’s martyrdom, proving himself a loyal fellow worker in the Christian ministry."
    born: 10
    bornCertainty: guess
    lifeEvents:
      - startDate: 49
        title: Joins Paul at Troas (Acts 16:10-12)
        location: Troas
        description: "Luke joined Paul at Troas during the apostle's second missionary journey and accompanied him to Philippi, as indicated by the 'we' accounts in Acts. Date Reasoning: Occurred in about 49 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=joined%20Paul%20at%20Troas%20on%20the%20apostle%E2%80%99s%20second%20missionary%20tour"
      - startDate: 50
        title: Ministry in Philippi (Acts 16:12–20:5)
        location: Philippi
        description: "Luke appears to have remained in Philippi while Paul continued his journey, later rejoining him as the third missionary journey concluded. Date Reasoning: Staid in Philippi from c. 50 C.E. until Paul's return in 56 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=accompanied%20him%20from%20there%20to%20Philippi%2C%20where%20he%20may%20have%20remained"
      - startDate: 56
        title: Accompanies Paul to Judea (Acts 21:7, 8, 15)
        location: Jerusalem
        description: "Rejoining Paul at the end of the third missionary tour, Luke accompanies him on the journey to Judea. Date Reasoning: Occurred in 56 C.E., following his stay in Philippi."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=Luke%20accompanied%20Paul%20to%20Judea%20at%20the%20end%20of%20that%20missionary%20tour"
      - startDate: 56
        title: Writing the Gospel of Luke (c. 56-58 C.E.)
        location: Caesarea
        description: "While Paul was imprisoned for two years at Caesarea, Luke likely wrote his Gospel account there, having carefully traced all things from the start. Date Reasoning: Spanned about 56-58 C.E., during Paul's custody under Felix and Festus."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=while%20the%20apostle%20was%20imprisoned%20for%20about%20two%20years%20at%20Caesarea%2C%20Luke%20probably%20wrote%20his%20Gospel%20account"
      - startDate: 58
        title: Voyage to Rome and Shipwreck (Acts 27:1–28:16)
        location: Malta; Rome
        description: "Luke accompanied Paul on his hazardous voyage to Rome for trial, experiencing the shipwreck on Malta along the way. Date Reasoning: Occurred between late 58 C.E. and early 59 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=accompanied%20Paul%20on%20his%20trip%20to%20Rome%20for%20trial"
      - startDate: 61
        title: Completing the Book of Acts (c. 61 C.E.)
        location: Rome
        description: "Likely completed his second inspired volume, Acts, in Rome towards the end of Paul's first imprisonment. Date Reasoning: Completed c. 61 C.E., covering events up to that point but omiting the outcome of Paul's appeal."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=Luke%20likely%20completed%20the%20book%20of%20Acts%20there%20by%20about%2061%C2%A0C.E"
      - startDate: 65
        title: Faithful Presence during Paul's Final Imprisonment (2 Tim 4:11)
        location: Rome
        description: "During Paul's second and final imprisonment in Rome, Luke is the only companion mentioned as remaining with him. Date Reasoning: c. 65 C.E., shortly before Paul's martyrdom."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/luke/#:~:text=stuck%20close%20to%20Paul%20and%20was%20with%20him%20shortly%20before%20the%20apostle%E2%80%99s%20martyrdom"
    died: 65
    diedCertainty: guess

  - id: titus
    name: Titus
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/
    description: "A Greek Christian and trusted fellow worker of the apostle Paul who served as a reliable administrator and overseer. Known for his unselfish ministry in Corinth and Crete, he was instrumental in organizing relief collections and appointing older men to strengthen the congregations. His presence at the Jerusalem Council served as a living testimony to the acceptance of uncircumcised Gentiles into the Christian fold."
    born: 15
    bornCertainty: guess
    lifeEvents:
      - startDate: 49
        title: Jerusalem Council (Acts 15:1, 2; Gal 2:1-3)
        location: Jerusalem
        description: "Titus accompanies Paul and Barnabas to Jerusalem as an uncircumcised Greek during the critical meeting of the apostles regarding circumcision. Date Reasoning: Commonly placed at c. 49 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=At%20the%20time%20the%20circumcision%20issue%20arose%20at%20Antioch%20(c.%C2%A049%C2%A0C.E.)%2C%20it%20appears%20that%20Titus%20accompanied%20Paul"
      - startDate: 55
        title: Sent to Corinth (2 Cor 2:13; 8:1-6)
        location: Corinth
        description: "Sent by Paul to Corinth to assist in the collection for needy brothers in Judea and to gauge the congregation's reaction to Paul's first letter. Date Reasoning: Occurred in about 55 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=About%2055%C2%A0C.E.%2C%20Titus%20ministered%20unselfishly%20to%20the%20Corinthian%20congregation"
      - startDate: 55
        title: Good Report From Corinth (2 Cor 7:6, 7)
        location: Macedonia
        description: "Titus meets Paul in Macedonia and delivers a positive report on the Corinthian congregation's obedience and commendable attitude. Date Reasoning: Followed his mission to Corinth in 55 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=he%20was%20able%20to%20give%20a%20good%20report%20about%20the%20Corinthian%20congregation"
      - startDate: 55
        title: Completing Corinthian Collection (2 Cor 8:6, 16, 17)
        location: Corinth
        description: "Paul desires Titus to return to Corinth to complete the relief contribution work he had initiated. Date Reasoning: Shortly after his meeting with Paul in Macedonia in 55 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=Since%20Titus%20had%20initiated%20matters%20in%20connection%20with%20the%20contribution%2C%20Paul%20desired%20that%20he%20complete%20the%20task"
      - startDate: 61
        title: Overseeing Appointments in Crete (Tit 1:4, 5)
        location: Crete
        description: "After Paul's release from his first imprisonment, he leaves Titus in Crete to correct defects and appoint older men in various cities. Date Reasoning: Sometime between 61 and 64 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=While%20in%20Crete%20(evidently%20sometime%20between%2061%20and%2064%C2%A0C.E.)"
      - startDate: 65
        title: Mission to Dalmatia (2 Tim 4:10)
        location: Dalmatia
        description: "During Paul's second imprisonment, Titus departs for Dalmatia, likely with Paul's approval or direction. Date Reasoning: c. 65 C.E., shortly before Paul's martyrdom."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/titus/#:~:text=Paul%E2%80%99s%20second%20imprisonment%20at%20Rome%20(c.%C2%A065%C2%A0C.E.)%2C%20Titus%2C%20likely%20at%20the%20apostle%E2%80%99s%20direction%20or%20with%20his%20approval%2C%20left%20for%20Dalmatia"
    died: 65
    diedCertainty: guess

  - id: timothy
    name: Timothy
    url: https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/
    description: "A loyal and beloved companion of the apostle Paul, Timothy was of mixed Jewish-Greek heritage and was trained in the holy writings from infancy by his mother and grandmother. Serving as a trusted fellow worker and overseer, he was entrusted with sensitive missions to various congregations and stuck close to Paul even during the apostle's final days. His name, meaning 'One Who Honors God,' aptly reflects his lifelong devotion to the Christian ministry."
    born: 30
    bornCertainty: guess
    lifeEvents:
      - startDate: 30
        startDateCertainty: guess
        title: Taught Holy Writings From Infancy (2 Tim 1:5; 3:15)
        location: Lystra
        description: "From a very young age, Timothy is taught 'the holy writings' by his mother Eunice and grandmother Lois, laying the foundation for his future faith. Date Reasoning: Born c. 30 C.E., with spiritual training beginning in early childhood."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=While%20very%20young%2C%20Timothy%20was%20taught%20%E2%80%9Cthe%20holy%20writings%E2%80%9D"
      - startDate: 49
        title: Joins Paul at Lystra (Acts 16:1-3)
        location: Lystra
        description: "Paul, recognizing Timothy's good reputation, chooses him as a traveling companion during his second missionary journey and circumcises him to avoid stumbling local Jews. Date Reasoning: Occurred in late 49 or early 50 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=late%20in%2049%20or%20early%20in%2050%C2%A0C.E.%2C%20when%20the%20apostle%20Paul%20arrived%20at%20Lystra"
      - startDate: 50
        title: Sent to Encourage Thessalonica (1 Thess 3:1-3)
        location: Beroea; Thessalonica
        description: "Paul sends Timothy from Beroea back to Thessalonica to encourage the new believers to remain faithful despite persecution. Date Reasoning: c. 50 C.E., during Paul's second missionary tour."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=advising%20Timothy%20to%20visit%20the%20brothers%20at%20Thessalonica%2C%20encouraging%20them%20to%20remain%20faithful"
      - startDate: 52
        title: Traveling Companion During Third Journey (Acts 20:4)
        location: Ephesus; Macedonia; Greece
        description: "Timothy again travels extensively with Paul throughout Asia Minor and Greece, sharing in the strengthening of many congregations. Date Reasoning: Spanned c. 52-56 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=During%20Paul%E2%80%99s%20third%20missionary%20journey%20(c.%C2%A052%2D56%C2%A0C.E.)%2C%20Timothy%20again%20traveled"
      - startDate: 59
        title: With Paul During First Imprisonment (Php 1:1; Col 1:1)
        location: Rome
        description: "Timothy is with Paul in Rome during his first imprisonment, his name appearing in the salutations of several of the apostle's letters. Date Reasoning: c. 59-61 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=letters%20written%20by%20Paul%20to%20the%20Philippians...during%20the%20apostle%E2%80%99s%20first%20imprisonment"
      - startDate: 61
        title: Enduring Personal Imprisonment (Heb 13:23)
        location: Rome
        description: "Timothy personally endures imprisonment in Rome, likely shortly after the conclusion of Paul's first custody. Date Reasoning: c. 61 C.E., before the writing of the letter to the Hebrews."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=Timothy%20personally%20endured%20imprisonment%20at%20Rome%20sometime%20within%20the%20period%20between%20the%20writing"
      - startDate: 61
        title: Overseeing Congregation at Ephesus (1 Tim 1:3; 5:22)
        location: Ephesus
        description: "After Paul's release, Timothy is directed to remain in Ephesus to oversee the congregation, having the authority to appoint overseers and ministerial servants. Date Reasoning: c. 61-64 C.E."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=After%20Paul%E2%80%99s%20release%20from%20prison%2C%20Timothy%20again%20shared%20with%20the%20apostle"
      - startDate: 65
        title: Final Call to Rome (2 Tim 4:6-9)
        location: Rome
        description: "Facing imminent death, Paul writes to Timothy, longing for his association and requesting that he come to him in Rome. Date Reasoning: c. 65 C.E., shortly before Paul's martyrdom."
        url: "https://www.jw.org/en/library/books/insight-on-the-scriptures/timothy/#:~:text=longing%20to%20see%20you%2C%...death"
    died: 97
    diedCertainty: guess
    
